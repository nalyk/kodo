# KODO Repo Configuration Template
# Copy to repos/{owner}-{repo}.toml and customize

[repo]
owner = ""                              # GitHub/GitLab owner or org
name = ""                               # Repository name
provider = "github"                     # github | gitlab | gitea | bitbucket
mode = "shadow"                         # shadow | live
branch_default = "main"                 # Default branch name
enabled = true                          # Master switch: disable to stop all scanning

[dev]
enabled = true                          # Enable dev engine
test_command = "npm test"               # Command to run tests (leave empty if none)
lint_command = "npm run lint"           # Command to run linter (leave empty if none)
tests_optional = false                  # true = skip test gate when no test command configured
lint_optional = false                   # true = skip lint gate when no lint command configured
allow_no_ci = false                     # true = allow merge when repo has no CI checks
max_diff_lines = 500                    # Hard gate: max diff size
auto_merge_deps = true                  # Auto-merge dependency updates if CI green
semver_release = true                   # Auto-tag semver releases after merge
await_bot_feedback = true               # Wait for bot reviews before auditing KODO-generated PRs
feedback_window_minutes = 10            # How long to wait for bot reviews (minutes)
max_feedback_rounds = 2                 # Max suggestion-apply cycles before proceeding to audit
apply_bot_suggestions = true            # Auto-apply code suggestions from trusted bots
trusted_review_bots = ["gemini-code-assist[bot]", "coderabbit[bot]"]
max_rebase_attempts = 2                 # Max server-side rebase retries before deferring

monitoring_window_hours = 48            # Post-merge CI monitoring window (hours)

[mkt]
enabled = true                          # Enable marketing engine
welcome_new_contributors = true         # Auto-welcome first-time contributors
generate_changelogs = true              # Auto-generate release changelogs
good_first_issues = true                # Curate good-first-issue labels weekly
contributor_spotlights = true           # Monthly contributor recognition

[pm]
enabled = true                          # Enable PM engine
weekly_report = true                    # Generate weekly velocity/roadmap report
daily_triage = true                     # Daily backlog grooming via Qwen
feature_evaluation = true               # Evaluate new feature requests
telegram_digest = true                  # Send weekly digest to Telegram

# Optional: self-hosted instance
# [provider]
# api_base = "https://gitlab.company.com"

